name: Build on request
on: [workflow_dispatch]

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 150
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"

    steps:
    - name: Workflow version marker
      run: echo "=== WORKFLOW v9 ==="
      shell: cmd

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clone vcpkg (pinned)
      shell: cmd
      run: |
        git clone https://github.com/microsoft/vcpkg C:\vcpkg-otc || exit /b 1
        cd /d C:\vcpkg-otc || exit /b 1
        git checkout 2022.05.10 || exit /b 1
        git log -1 --oneline

    - name: Bootstrap vcpkg
      shell: cmd
      run: |
        cd /d C:\vcpkg-otc || exit /b 1
        call .\bootstrap-vcpkg.bat || exit /b 1
        if not exist C:\vcpkg-otc\vcpkg.exe exit /b 1
        .\vcpkg.exe version

    - name: Force v143 toolset in triplet (runner has only VS2022)
      shell: pwsh
      run: |
        Add-Content -Path C:\vcpkg-otc\triplets\community\x86-windows-static.cmake -Value "set(VCPKG_PLATFORM_TOOLSET v143)"
        Get-Content C:\vcpkg-otc\triplets\community\x86-windows-static.cmake

    - name: Neutralize pkgconfig fixup (dead msys2 mirrors)
      shell: pwsh
      run: |
        Set-Content -Path C:\vcpkg-otc\scripts\cmake\vcpkg_fixup_pkgconfig.cmake -Value "function(vcpkg_fixup_pkgconfig)`nendfunction()"
        Get-Content C:\vcpkg-otc\scripts\cmake\vcpkg_fixup_pkgconfig.cmake

    - name: Patch old ports for CMake 4 (policy minimum)
      shell: pwsh
      run: |
        $ports = @('openal-soft','physfs','glew','libogg','bzip2','zlib','libvorbis','libzip','openssl')
        foreach ($p in $ports) {
          $f = "C:\vcpkg-otc\ports\$p\portfile.cmake"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw
            $new = $c -replace '(?m)^(\s*)OPTIONS(\s*)$', "`$1OPTIONS`$2`n`$1    -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
            if ($new -ne $c) {
              Set-Content -Path $f -Value $new
              Write-Host "Patched: $p"
            } else {
              Write-Host "No OPTIONS line found in: $p (skipped)"
            }
          }
        }
        # twarda weryfikacja najwazniejszego portu
        $check = Get-Content "C:\vcpkg-otc\ports\openal-soft\portfile.cmake" -Raw
        if ($check -notmatch 'CMAKE_POLICY_VERSION_MINIMUM') {
          Write-Error "openal-soft NIE zostal zalatany - przerywam"
          exit 1
        }
        Write-Host "--- openal-soft portfile (fragment) ---"
        Select-String -Path "C:\vcpkg-otc\ports\openal-soft\portfile.cmake" -Pattern 'OPTIONS','POLICY' -Context 0,1 | ForEach-Object { $_.Line }

    - name: Pre-seed vcpkg downloads (fix dead mirrors)
      shell: cmd
      run: |
        if not exist C:\vcpkg-otc\downloads mkdir C:\vcpkg-otc\downloads
        curl -L --fail -o C:\vcpkg-otc\downloads\7z2107-extra.7z https://github.com/ip7z/7zip/releases/download/21.07/7z2107-extra.7z || exit /b 1
        dir C:\vcpkg-otc\downloads

    - name: Install dependencies
      shell: cmd
      run: |
        cd /d C:\vcpkg-otc || exit /b 1
        .\vcpkg.exe install boost-iostreams:x86-windows-static boost-asio:x86-windows-static boost-beast:x86-windows-static boost-system:x86-windows-static boost-variant:x86-windows-static boost-lockfree:x86-windows-static boost-process:x86-windows-static boost-program-options:x86-windows-static boost-uuid:x86-windows-static boost-filesystem:x86-windows-static luajit:x86-windows-static glew:x86-windows-static physfs:x86-windows-static openal-soft:x86-windows-static libogg:x86-windows-static libvorbis:x86-windows-static zlib:x86-windows-static libzip:x86-windows-static bzip2:x86-windows-static openssl:x86-windows-static || exit /b 1

    - name: Dump vcpkg failure logs
      if: failure()
      shell: pwsh
      run: |
        Get-ChildItem -Path C:\vcpkg-otc\buildtrees -Recurse -Include *-out.log,*-err.log -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Host "===== $($_.FullName) ====="
          Get-Content $_.FullName -Tail 60
        }

    - name: Verify installed headers
      shell: cmd
      run: |
        if not exist "C:\vcpkg-otc\installed\x86-windows-static\include\boost\system\config.hpp" (
          echo BLAD: brak naglowkow boost po instalacji!
          dir C:\vcpkg-otc\installed\x86-windows-static\include 2>nul
          exit /b 1
        )
        echo Naglowki boost OK

    - name: Integrate vcpkg
      shell: cmd
      run: |
        cd /d C:\vcpkg-otc || exit /b 1
        .\vcpkg.exe integrate install || exit /b 1

    - name: Compile otclient_gl
      timeout-minutes: 30
      shell: cmd
      run: |
        cd vc16
        MSBuild /property:Configuration=OpenGL /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /p:BUILD_REVISION=%GITHUB_RUN_NUMBER%

    - name: Compile otclient_dx
      timeout-minutes: 30
      continue-on-error: true
      shell: cmd
      run: |
        cd vc16
        MSBuild /property:Configuration=DirectX /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /p:BUILD_REVISION=%GITHUB_RUN_NUMBER%

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: Download-binaries
        path: |
          otclient_gl.exe
          otclient_dx.exe
        if-no-files-found: error
